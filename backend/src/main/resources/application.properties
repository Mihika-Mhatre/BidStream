# ─────────────────────────────────────────
# SERVER
# ─────────────────────────────────────────
server.port=8080

# ─────────────────────────────────────────
# MONGODB — use URI only (removes the conflict)
# The database name MUST be in the URI itself
# ─────────────────────────────────────────
spring.data.mongodb.uri=mongodb://localhost:27017/bidstream

# ─────────────────────────────────────────
# JSON — return ISO-8601 strings, not epoch numbers
# ─────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ─────────────────────────────────────────
# JWT
# ─────────────────────────────────────────
jwt.secret=BidStream_SuperSecret_256BitKey_ChangeThisInProduction_2026!
jwt.expiration-ms=86400000

# ─────────────────────────────────────────
# LOGGING
# ─────────────────────────────────────────
logging.level.com.bidstream=DEBUG
logging.level.org.springframework.security=DEBUG